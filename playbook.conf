<?xml version="0.2.4" encoding="utf-8"?>
<Playbook>
    <Name>SynergyOS</Name>
    <Username>Synergy</Username>
    <ShortDescription>https://discord.gg/kwanteks</ShortDescription>
    <Title>SynergyOS Playbook</Title>
    <Description>Designed to help you deploy the Tweaks of the YouTuber Khorive Tech using SynergyOS on your system </Description>
    <Details>Experience a lightweight and improved privacy and performance. </Details>
    <Version>0.2.4</Version>
    <UniqueId>8d2981ab-6d76-4a90-9ef6-3a3f620460bc</UniqueId>
    <SupportedBuilds>
		<string>1501</string> 
        <string>22000</string>
        <string>22621</string>
        <string>22631</string>
        <string>22635</string>
        <string>26100</string>
        <string>26200</string>
    </SupportedBuilds>
    <Requirements>
        <Requirement>Internet</Requirement> #Requires an active internet connection to download necessary files and updates during the installation process, ensuring that the latest versions of the tweaks and any dependencies are installed correctly.
        <Requirement>NoPendingUpdates</Requirement> #Requires that there are no pending Windows updates, as they may interfere with the installation process or cause conflicts with the tweaks being applied, leading to potential system instability or security issues.
        <Requirement>DefenderDisabled</Requirement> #Requires that Windows Defender is disabled, as some of the tweaks being applied may be flagged as potentially unwanted programs (PUPs) or may interfere with the installation process, leading to potential system instability or security issues.
        <Requirement>NoAntivirus</Requirement> #Requires that no third-party antivirus software is installed on the system, as it may interfere with the installation process or cause conflicts with the tweaks being applied, leading to potential system instability or security issues.
        <Requirement>PluggedIn</Requirement> #Requires the device to be plugged in to ensure that the installation process is not interrupted due to power issues, which could lead to an incomplete installation or potential system instability.
		<Requirement>BatteryAbove15Percent</Requirement> #Requires the device to be plugged in and have a battery level above 15% to ensure that the installation process is not interrupted due to power issues, which could lead to an incomplete installation or potential system instability.
		<Requirement>FreshInstall</Requirement> #Requires a fresh install of Windows, as some of the tweaks may not work properly if they have already been applied or if there are existing configurations that conflict with the playbook's changes.
		<Requirement>SystemRestorePoint</Requirement> #Requires the creation of a system restore point before applying any tweaks, allowing users to revert their system back to its previous state in case any issues arise during or after the installation process, ensuring that they can easily recover from potential problems without losing important data or settings.
		<Requirement>LocalAccount</Requirement> #Requires the use of a local account instead of a Microsoft account, as some of the tweaks may not work properly or may cause issues when applied to a system that is linked to a Microsoft account, ensuring better compatibility and stability for the playbook's changes.    
    </Requirements>
    <Website>https://discord.gg/kwanteks</Website> 
   <FeaturePages>
		<CheckboxPage IsRequired="true">
			<Options>
				<CheckboxOption>
					<Text>Install a Browser</Text>
					<Name>install-browser</Name>
				</CheckboxOption>
			</Options>
		</CheckboxPage>
		<RadioImagePage DependsOn="install-browser" DefaultOption="browser-firefox">
			<Options>
				<RadioImageOption>
					<Text>Chrome</Text>
					<Name>browser-chrome</Name>
					<FileName>chrome</FileName>
					<GradientTopColor>#4285F4</GradientTopColor>
					<GradientBottomColor>#34A853</GradientBottomColor>
				</RadioImageOption>
				<RadioImageOption>
					<Text>Firefox</Text>
					<Name>browser-firefox</Name>
					<FileName>firefox</FileName>
					<GradientTopColor>#FF7139</GradientTopColor>
					<GradientBottomColor>#FF2C00</GradientBottomColor>
				</RadioImageOption>
				<RadioImageOption>
					<Text>Brave</Text>
					<Name>browser-brave</Name>
					<FileName>brave</FileName>
					<GradientTopColor>#FF4500</GradientTopColor>
					<GradientBottomColor>#F38F02</GradientBottomColor>
				</RadioImageOption>
			</Options>
		</RadioImagePage>
		<RadioPage DefaultOption="disable-defender" Description="Disabling Windows Defender can improve system performance, but at the cost of security.">
			<Options>
				<RadioOption>
					<Text>Disable Defender (Default)</Text>
					<Name>disable-defender</Name>
				</RadioOption>
				<RadioOption>
					<Text>Enable Defender</Text>
					<Name>enable-defender</Name>
				</RadioOption>
			</Options>
		</RadioPage>
	</FeaturePages>
</Playbook>