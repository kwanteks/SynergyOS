<?xml version="1.0" encoding="utf-8"?>
<Playbook>
    <Name>SynergyOS</Name>
    <Username>Synergy</Username>
    <ShortDescription>https://discord.gg/kwanteks</ShortDescription>
    <Title>SynergyOS Playbook</Title>
    <Description>Designed to help you deploy the Tweaks of the YouTuber Khorive Tech using SynergyOS on your system </Description>
    <Details>Experience a lightweight and improved privacy and performance. </Details>
    <Version>1.0</Version>
    <UniqueId>8d2981ab-6d76-4a90-9ef6-3a3f620460bc</UniqueId>
    <SupportedBuilds>
		<string>19044</string>
		<string>19045</string> 
        <string>22000</string>
        <string>22621</string>
        <string>22631</string>
        <string>22635</string>
        <string>26100</string>
        <string>26200</string>
    </SupportedBuilds>
    <Requirements>
        <Requirement>Internet</Requirement>
        <Requirement>NoPendingUpdates</Requirement>
        <Requirement>DefenderDisabled</Requirement>
        <Requirement>NoAntivirus</Requirement>
        <Requirement>PluggedIn</Requirement>                              
    </Requirements>
    <Website>https://discord.gg/kwanteks</Website> 
   <FeaturePages>
		<CheckboxPage IsRequired="true">
			<Options>
				<CheckboxOption>
					<Text>Install a Browser</Text>
					<Name>install-browser</Name>
				</CheckboxOption>
			</Options>
		</CheckboxPage>
		<RadioImagePage DependsOn="install-browser" DefaultOption="browser-firefox">
			<Options>
				<RadioImageOption>
					<Text>Chrome</Text>
					<Name>browser-chrome</Name>
					<FileName>chrome</FileName>
					<GradientTopColor>#4285F4</GradientTopColor>
					<GradientBottomColor>#34A853</GradientBottomColor>
				</RadioImageOption>
				<RadioImageOption>
					<Text>Firefox</Text>
					<Name>browser-firefox</Name>
					<FileName>firefox</FileName>
					<GradientTopColor>#FF7139</GradientTopColor>
					<GradientBottomColor>#FF2C00</GradientBottomColor>
				</RadioImageOption>
				<RadioImageOption>
					<Text>Brave</Text>
					<Name>browser-brave</Name>
					<FileName>brave</FileName>
					<GradientTopColor>#FF4500</GradientTopColor>
					<GradientBottomColor>#F38F02</GradientBottomColor>
				</RadioImageOption>
			</Options>
		</RadioImagePage>
		<RadioPage IsRequired="true" DefaultOption="disable-defender" Description="Disabling Windows Defender can improve system performance, but at the cost of security.">
			<Options>
				<RadioOption>
					<Text>Disable Defender (Default)</Text>
					<Name>disable-defender</Name>
				</RadioOption>
				<RadioOption>
					<Text>Enable Defender</Text>
					<Name>enable-defender</Name>
				</RadioOption>
			</Options>
		</RadioPage>
		<RadioPage IsRequired="true" DefaultOption="disable-xbox" Description="Disables Xbox Services.">
			<Options>
				<RadioOption>
					<Text>Disable Xbox Services (Default)</Text>
					<Name>disable-xbox</Name>
					</RadioOption>
					<RadioOption>
						<Text>Enable Xbox Services</Text>
						<Name>enable-xbox</Name>
					</RadioOption>
			</Options>
		</RadioPage>	
	</FeaturePages>
</Playbook>